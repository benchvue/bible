<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>예수님의 3가지 비유와 종교인의 3 도전</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{
    font-family:"Malgun Gothic",sans-serif;
    background:#f4f6f8;
}

/* =========================
세로모드 안내화면
========================= */
.rotate-screen{
    position:fixed;
    inset:0;
    background:#000;
    color:#fff;
    z-index:9999;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:30px;
}

.rotate-icon{
    font-size:4rem;
    margin-bottom:18px;
}

.rotate-title{
    font-size:2rem;
    font-weight:bold;
    margin-bottom:10px;
}

.rotate-sub{
    color:#ccc;
    font-size:1.05rem;
    line-height:1.6;
}

/* =========================
게임 본체
========================= */
.main{
    display:block;
    padding:12px;
}

h1{
    text-align:center;
    margin-bottom:12px;
    font-size:1.15rem;
    line-height:1.3;
}

/* 4열 고정 */
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    max-width:1400px;
    margin:auto;
}

.card{
    height:96px;
    perspective:1000px;
    position:relative;
    cursor:pointer;
    overflow:visible;
}

.card-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .75s;
}

.card.flipped .card-inner{
    transform:rotateY(180deg);
}

.card-front,
.card-back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:6px;
    color:#fff;
    font-weight:bold;
    line-height:1.15;
    backface-visibility:hidden;
    box-shadow:0 5px 12px rgba(0,0,0,.18);
}

/* 앞면 */
.card-front{
    font-size:.92rem;
}

/* 뒷면 */
.card-back{
    transform:rotateY(180deg);
    font-size:.72rem;
}

/* 4열 */
.col4 .card-back{
    font-size:.63rem;
}

/* 색상 */
.col1 .card-front{background:#2f5d8a;}
.col2 .card-front{background:#c0392b;}
.col3 .card-front{background:#2e8b57;}
.col4 .card-front{background:#2f5d8a;}

.col1 .card-back{background:#1c3e61;}
.col2 .card-back{background:#8f251b;}
.col3 .card-back{background:#1f5c39;}
.col4 .card-back{background:#1c3e61;}

/* VS */
.vs::after{
    content:"VS";
    position:absolute;
    top:50%;
    right:-6px;
    transform:translate(50%,-50%);
    width:24px;
    height:24px;
    border-radius:50%;
    background:#fff;
    color:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:.55rem;
    font-weight:900;
    z-index:500;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
}

/* =========================
iPhone 세로일 때만 차단
========================= */
@media screen and (max-width:900px) and (orientation:portrait){
    .rotate-screen{
        display:flex;
    }

    .main{
        display:none;
    }
}

/* PC / Tablet */
@media screen and (min-width:901px){

    .rotate-screen{
        display:none !important;
    }

    .main{
        display:block !important;
        padding:40px 20px;
    }

    h1{
        font-size:2rem;
        margin-bottom:30px;
    }

    .grid{
        gap:24px;
    }

    .card{
        height:180px;
    }

    .card-front{
        font-size:2rem;
    }

    .card-back{
        font-size:1.45rem;
    }

    .col4 .card-back{
        font-size:1.12rem;
    }

    .vs::after{
        width:56px;
        height:56px;
        right:-30px;
        font-size:1.25rem;
    }
}
</style>
</head>

<body>

<!-- 세로모드 -->
<div class="rotate-screen">
    <div class="rotate-icon">📱↻</div>
    <div class="rotate-title">가로로 돌려주세요</div>
    <div class="rotate-sub">
        iPhone 가로모드에서<br>
        카드 게임이 시작됩니다.
    </div>
</div>

<!-- 본문 -->
<div class="main">

<h1>예수님의 3가지 비유와 종교인의 3 도전(질문)</h1>

<div class="grid">

<!-- row1 -->
<div class="card col1 vs" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">비유1</div>
<div class="card-back">두 아들</div>
</div></div>

<div class="card col2" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">도전1</div>
<div class="card-back">권위가 어디서 왔느냐?</div>
</div></div>

<div class="card col3" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">연결1</div>
<div class="card-back">순종 없는 종교</div>
</div></div>

<div class="card col4" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">답변1</div>
<div class="card-back">요한의 세례가 어디로부터냐?</div>
</div></div>

<!-- row2 -->
<div class="card col1 vs" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">비유2</div>
<div class="card-back">악한 농부</div>
</div></div>

<div class="card col2" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">도전2</div>
<div class="card-back">가이사 세금은 누구한테?</div>
</div></div>

<div class="card col3" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">연결2</div>
<div class="card-back">소유권 착각</div>
</div></div>

<div class="card col4" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">답변2</div>
<div class="card-back">가이사의 것은 가이사에게</div>
</div></div>

<!-- row3 -->
<div class="card col1 vs" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">비유3</div>
<div class="card-back">혼인잔치</div>
</div></div>

<div class="card col2" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">도전3</div>
<div class="card-back">7형제의 아내는 누구?</div>
</div></div>

<div class="card col3" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">연결3</div>
<div class="card-back">하나님 나라 거절</div>
</div></div>

<div class="card col4" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">답변3</div>
<div class="card-back">천사들과 같다</div>
</div></div>

</div>
</div>

<script>
function flip(card){
    card.classList.toggle("flipped");
}

/* iPhone orientation 강제 새로고침급 재렌더 */
window.addEventListener("orientationchange",()=>{
    setTimeout(()=>{
        location.reload();
    },250);
});
</script>

</body>
</html>
