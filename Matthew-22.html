<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>예수님의 3가지 비유와 종교인의 3 도전</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Malgun Gothic",sans-serif;
    background:#f4f6f8;
    padding:12px;
}

/* 제목 */
h1{
    text-align:center;
    margin-bottom:14px;
    font-size:1.15rem;
    line-height:1.3;
}

/* 기본 = 모바일 가로 2 x 6 */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    max-width:1000px;
    margin:auto;
}

/* 카드 */
.card{
    height:95px;
    perspective:1000px;
    cursor:pointer;
    position:relative;
    overflow:visible;
}

.card-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .75s;
}

.card.flipped .card-inner{
    transform:rotateY(180deg);
}

.card-front,
.card-back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:6px;
    color:#fff;
    font-weight:bold;
    line-height:1.15;
    backface-visibility:hidden;
    box-shadow:0 4px 12px rgba(0,0,0,.18);
}

/* 앞면 */
.card-front{
    font-size:.95rem;
}

/* 뒷면 */
.card-back{
    transform:rotateY(180deg);
    font-size:.72rem;
}

.col4 .card-back{
    font-size:.62rem;
}

/* 색상 */
.row1 .card-front{background:#2f5d8a;}
.row2 .card-front{background:#c0392b;}
.row3 .card-front{background:#2e8b57;}
.row4 .card-front{background:#2f5d8a;}

.row1 .card-back{background:#1c3e61;}
.row2 .card-back{background:#8f251b;}
.row3 .card-back{background:#1f5c39;}
.row4 .card-back{background:#1c3e61;}


/* PC에서는 4 x 3 */
@media screen and (min-width:900px){

    body{
        padding:40px 20px;
    }

    h1{
        font-size:4rem;
        margin-bottom:30px;
    }

    .grid{
        grid-template-columns:repeat(3,1fr);
        gap:24px;
        max-width:1700px;
    }

    .card{
        height:180px;
    }

    .card-front{
        font-size:4rem;
    }

    .row1 .card-back{
        font-size:3.5rem;
    }
    .card-back{
        font-size:1.8rem;
    }
    .row2 .card-back{
        font-size:3rem;
    }   
    .row3 .card-back{
        font-size:4rem;
    }
    .row4 .card-back{
        font-size:2.3rem;
    }
}
</style>
</head>

<body>

<h1>예수님의 3가지 비유와 종교인의 3 도전(질문)</h1>

<div class="grid">

<!-- 1 -->
<div class="card row1" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">비유 1</div>
<div class="card-back">포도원 농부</div>
</div></div>

<div class="card row1" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">비유 2</div>
<div class="card-back">건축자의 버린돌</div>
</div></div>

<div class="card row1" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">비유 3</div>
<div class="card-back">혼인잔치</div>
</div></div>

<!--2 -->
<div class="card row2" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">도전 1</div>
<div class="card-back">가이사 세금은 누구한테?</div>
</div></div>

<div class="card row2" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">도전 2</div>
<div class="card-back">7형제의 아내는 누구의 아내냐?</div>
</div></div>

<div class="card row2" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">도전 3</div>
<div class="card-back">율법 중에서 어느 계명이 크니이까?</div>
</div></div>

<!-- 3 -->
<div class="card row3" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">연결점 1</div>
<div class="card-back">세금</div>
</div></div>

<div class="card row3" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">연결점 2</div>
<div class="card-back">부활</div>
</div></div>

<div class="card row3" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">연결점 3</div>
<div class="card-back">큰계명</div>
</div></div>

<!-- 4 -->
<div class="card row4" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">답변 1</div>
<div class="card-back">가이사의 것은 가이사에게<br>하나님의 것은 하나님께</div>
</div></div>

<div class="card row4" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">답변 2</div>
<div class="card-back">부활 때에는 장가도 아니 가고<br>시집도 아니 가고<br>하늘에 있는 천사들과 같으니라</div>
</div></div>

<div class="card row4" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">답변 3</div>
<div class="card-back">주 너의 하나님을 사랑하라<br>네 이웃을 네 자신 같이 사랑</div>
</div></div>

</div>

<script>
function flip(card){
    card.classList.toggle("flipped");
}
</script>

</body>
</html>
