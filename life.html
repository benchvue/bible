<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동물 스무고개 게임 - Modern Edition</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--primary:#2563eb;
--primary2:#1d4ed8;
--danger:#dc2626;
--success:#059669;
--dark:#0f172a;
--glass:rgba(255,255,255,.16);
--border:rgba(255,255,255,.28);
}

body{
font-family:Inter,"Malgun Gothic",sans-serif;
background:
radial-gradient(circle at top left,#60a5fa 0%,transparent 35%),
radial-gradient(circle at bottom right,#34d399 0%,transparent 35%),
linear-gradient(135deg,#0f172a,#1e293b,#334155);
min-height:100vh;
padding:28px;
color:white;
}

.container{
max-width:1500px;
margin:auto;
}

h1{
text-align:center;
font-size:2.3rem;
font-weight:800;
margin-bottom:18px;
letter-spacing:-1px;
}

.topMenu{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:28px;
flex-wrap:wrap;
}

.topMenu button{
padding:14px 28px;
border:none;
border-radius:16px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(14px);
color:white;
font-size:1rem;
font-weight:700;
cursor:pointer;
transition:.25s;
border:1px solid rgba(255,255,255,.12);
}

.topMenu button:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.16);
}

.topMenu button.activeGame{
background:linear-gradient(135deg,var(--primary),var(--primary2));
box-shadow:0 10px 30px rgba(37,99,235,.35);
}

.sub{
text-align:center;
color:rgba(255,255,255,.82);
margin-bottom:22px;
font-size:1.05rem;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:18px;
}

.card{
height:145px;
perspective:1200px;
cursor:pointer;
}

.card-inner{
position:relative;
width:100%;
height:100%;
transform-style:preserve-3d;
transition:transform .8s cubic-bezier(.4,.2,.2,1);
}

.card.open .card-inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
inset:0;
border-radius:22px;
backface-visibility:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:14px;
box-shadow:0 18px 35px rgba(0,0,0,.25);
}

.front{
background:rgba(255,255,255,.10);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.18);
}

.badge{
width:68px;
height:68px;
border-radius:50%;
background:linear-gradient(135deg,#ffffff,#dbeafe);
color:#1d4ed8;
display:flex;
align-items:center;
justify-content:center;
font-size:1.7rem;
font-weight:900;
box-shadow:0 10px 20px rgba(0,0,0,.18);
}

.back{
transform:rotateY(180deg);
background:white;
color:#0f172a;
font-weight:700;
font-size:1rem;
line-height:1.45;
text-align:center;
}

.controls{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-top:26px;
}

.controls button{
padding:13px 24px;
border:none;
border-radius:16px;
font-size:1rem;
font-weight:800;
cursor:pointer;
color:white;
transition:.22s;
}

.controls button:hover{
transform:translateY(-2px);
}

.btn1{background:linear-gradient(135deg,#ef4444,#dc2626);}
.btn2{background:linear-gradient(135deg,#3b82f6,#1d4ed8);}
.btn3{background:linear-gradient(135deg,#10b981,#059669);}

.answerScreen{
display:none;
text-align:center;
margin-top:25px;
}

.answerTitle{
font-size:2.6rem;
font-weight:900;
margin-bottom:18px;
}

.answerScreen img{
width:min(900px,100%);
border-radius:24px;
box-shadow:0 20px 40px rgba(0,0,0,.35);
}

.quote{
max-width:900px;
margin:22px auto;
padding:24px;
border-radius:22px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
font-size:1.28rem;
line-height:1.8;
font-weight:700;
}

.game{display:none;}
.game.active{display:block;}

@media(max-width:1100px){
.grid{grid-template-columns:repeat(4,1fr);}
}

@media(max-width:800px){
.grid{grid-template-columns:repeat(3,1fr);}
}

@media(max-width:600px){
.grid{grid-template-columns:repeat(2,1fr);}
h1{font-size:1.8rem;}
.card{height:130px;}
}
</style>
</head>

<body>
<div class="container">

<h1>스무고개 카드 게임</h1>

<div class="topMenu">
<button id="btn-penguin" class="activeGame" onclick="selectGame('penguin')">동물 1</button>
<button id="btn-albatross" onclick="selectGame('albatross')">동물 2</button>
</div>

<!-- 황제 펭귄 -->
<div class="game active" id="penguin">

<div id="penguinGame">
<div class="sub">번호 카드를 열며 정답을 맞혀보세요.</div>
<div class="grid" id="penguinGrid"></div>

<div class="controls">
<button class="btn1" onclick="showAnswer('penguin')">정답 보기</button>
<button class="btn2" onclick="resetCards('penguinGrid')">초기화</button>
<button class="btn3" onclick="showAll('penguinGrid')">모두 보기</button>
</div>
</div>

<div class="answerScreen" id="penguinAnswer">
<div class="answerTitle">황제 펭귄</div>

<img src="https://www.antarctica.gov.au/site/assets/files/67453/rs14963.1600x0.jpg">

<div class="quote">
황제 펭귄은 가장 추운 곳에서 생명을 낳습니다.<br>
자기 몸을 깎아가며 먹지 못하면서도 끝까지 알을 품습니다.<br>
왜냐하면 생명이 더 중요하기 때문입니다.
</div>

<div class="controls">
<button class="btn2" onclick="backToGame('penguin')">돌아가기</button>
</div>
</div>
</div>

<!-- 알바트로스 -->
<div class="game" id="albatross">

<div id="albatrossGame">
<div class="sub">번호 카드를 열며 정답을 맞혀보세요.</div>
<div class="grid" id="albatrossGrid"></div>

<div class="controls">
<button class="btn1" onclick="showAnswer('albatross')">정답 보기</button>
<button class="btn2" onclick="resetCards('albatrossGrid')">초기화</button>
<button class="btn3" onclick="showAll('albatrossGrid')">모두 보기</button>
</div>
</div>

<div class="answerScreen" id="albatrossAnswer">
<div class="answerTitle">알바트로스</div>

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Diomedea_exulans_in_flight_-_SE_Tasmania.jpg/1280px-Diomedea_exulans_in_flight_-_SE_Tasmania.jpg">

<div class="quote">
알바트로스는 텃새와는 다릅니다.<br>
같은 하늘을 나는 새라도 차원이 다르면 사는 방식 자체가 달라집니다.<br>
보이지 않는 바람을 믿고 끝없는 바다를 건너갑니다.
</div>

<div class="controls">
<button class="btn2" onclick="backToGame('albatross')">돌아가기</button>
</div>
</div>
</div>

</div>

<script>
function makeCards(targetId,hints){
const grid=document.getElementById(targetId);
hints.forEach((txt,i)=>{
const card=document.createElement("div");
card.className="card";
card.innerHTML=`
<div class="card-inner">
<div class="front"><div class="badge">${i+1}</div></div>
<div class="back">${txt}</div>
</div>`;
card.onclick=()=>card.classList.toggle("open");
grid.appendChild(card);
});
}

const penguinHints=[
"이 동물은 새입니다.","하지만 날지 못합니다.","물속에서 빠릅니다.","추운 곳에 삽니다.","검정과 흰색 몸입니다.",
"무리 생활합니다.","걷는 모습이 귀엽습니다.","물고기와 크릴을 먹습니다.","잠수를 잘합니다.","남극에 삽니다.",
"펭귄 중 가장 큽니다.","40kg까지 자랍니다.","겨울에 번식합니다.","알은 발 위에 둡니다.","수컷이 약 60~70일 품습니다.",
"먹지 않고 버팁니다.","영하 40~60도 추위도 견딥니다.","몸을 붙여 열을 나눕니다.","엄마가 먹이를 구해 옵니다.","이름 첫 글자는 황제입니다."
];

const albaHints=[
"이 동물은 새입니다.","바다에서 오래 삽니다.","몸집이 큽니다.","물고기와 오징어를 먹습니다.","날개가 매우 깁니다.",
"걷기보다 비행이 유명합니다.","외딴 섬에서 번식합니다.","짝을 오래 유지합니다.","암수 함께 알을 돌봅니다.","활공 비행의 달인입니다.",
"바람을 이용합니다.","날갯짓 거의 안 합니다.","하루 수백km 이동합니다.","수천km 바다를 건넙니다.","날개 길이가 매우 깁니다.",
"큰 종은 3.5m 이상입니다.","남반구 바다에 많습니다.","선원 전설에 등장합니다.","긴 여행의 상징입니다.","이름은 알바...로 시작합니다."
];

makeCards("penguinGrid",penguinHints);
makeCards("albatrossGrid",albaHints);

function showAll(id){
document.querySelectorAll("#"+id+" .card").forEach(c=>c.classList.add("open"));
}

function resetCards(id){
document.querySelectorAll("#"+id+" .card").forEach(c=>c.classList.remove("open"));
}

function showAnswer(type){
document.getElementById(type+"Game").style.display="none";
document.getElementById(type+"Answer").style.display="block";
}

function backToGame(type){
document.getElementById(type+"Answer").style.display="none";
document.getElementById(type+"Game").style.display="block";
showAll(type+"Grid");
}

function selectGame(type){
document.querySelectorAll(".game").forEach(g=>g.classList.remove("active"));
document.getElementById(type).classList.add("active");

document.getElementById("btn-penguin").classList.remove("activeGame");
document.getElementById("btn-albatross").classList.remove("activeGame");
document.getElementById("btn-"+type).classList.add("activeGame");
}
</script>

</body>
</html>
